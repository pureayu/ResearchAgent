services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: helloagents-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - helloagents_pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d researchagent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  helloagents_pgvector_data:
